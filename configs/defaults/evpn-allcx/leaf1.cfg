# evpn-allcx (OSPF underlay + iBGP EVPN + VXLAN L2VNI) for AOS-CX leaf1 (CLI)
# Role: OSPF area0 underlay + iBGP EVPN RR-client (AS 65000) toward spine1/spine2.
#   VTEP source = loopback0 (10.255.1.1). Group1 = VLAN10/VNI10010. PC1 on 1/1/3 access vlan 10.
#   iBGP single-AS -> route-target auto (AS:VNI). leaf1/leaf3 share VNI10010 auto-RT,
#   so PC1<->PC3 reach each other over the VXLAN fabric. No manual RT needed (unlike eBGP).
#   VLAN<->VNI mapping lives under "interface vxlan 1" (vni -> vlan); this AOS-CX
#   rejects "vni" inside vlan context, so it is NOT placed under "vlan 10".
configure terminal
hostname LEAF1
vlan 10
router ospf 1
    router-id 10.255.1.1
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface loopback 0
    ip address 10.255.1.1/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.1
    no shutdown
    vni 10010
        vlan 10
        exit
    exit
evpn
    vlan 10
        rd auto
        route-target export auto
        route-target import auto
        exit
    exit
router bgp 65000
    bgp router-id 10.255.1.1
    neighbor 10.255.0.1 remote-as 65000
    neighbor 10.255.0.1 update-source loopback 0
    neighbor 10.255.0.2 remote-as 65000
    neighbor 10.255.0.2 update-source loopback 0
    address-family l2vpn evpn
        neighbor 10.255.0.1 activate
        neighbor 10.255.0.2 activate
        exit-address-family
end
