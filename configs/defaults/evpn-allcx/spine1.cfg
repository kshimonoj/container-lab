# evpn-allcx (OSPF underlay + iBGP EVPN RR) default config for AOS-CX spine1 (CLI)
# Role: OSPF area0 underlay + iBGP EVPN Route Reflector (AS 65000). NO VXLAN/VTEP.
#   Spine relays EVPN routes leaf<->leaf as RR (Aruba ref design, NOT a Lean Spine).
#   1/1/1 -> leaf1 (10.0.1.0/31), 1/1/2 -> leaf2 (10.0.1.2/31), 1/1/3 -> leaf3 (10.0.1.4/31).
#   lo0 10.255.0.1/32 = router-id / OSPF + iBGP update-source.
configure terminal
hostname SPINE1
router ospf 1
    router-id 10.255.0.1
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.0/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.1.2/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    ip address 10.0.1.4/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface loopback 0
    ip address 10.255.0.1/32
    ip ospf 1 area 0.0.0.0
router bgp 65000
    bgp router-id 10.255.0.1
    neighbor 10.255.1.1 remote-as 65000
    neighbor 10.255.1.1 update-source loopback 0
    neighbor 10.255.1.2 remote-as 65000
    neighbor 10.255.1.2 update-source loopback 0
    neighbor 10.255.1.3 remote-as 65000
    neighbor 10.255.1.3 update-source loopback 0
    address-family l2vpn evpn
        neighbor 10.255.1.1 activate
        neighbor 10.255.1.1 route-reflector-client
        neighbor 10.255.1.2 activate
        neighbor 10.255.1.2 route-reflector-client
        neighbor 10.255.1.3 activate
        neighbor 10.255.1.3 route-reflector-client
        exit-address-family
end
