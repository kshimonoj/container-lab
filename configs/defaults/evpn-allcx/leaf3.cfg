# evpn-allcx (OSPF underlay + iBGP EVPN + VXLAN L2VNI) for AOS-CX leaf3 (CLI)
# Role: OSPF area0 underlay + iBGP EVPN RR-client (AS 65000) toward spine1/spine2.
#   VTEP source = loopback0 (10.255.1.3). leaf3 hosts BOTH groups:
#     Group1 = VLAN10/VNI10010, PC3 on 1/1/3 access vlan 10
#     Group2 = VLAN20/VNI10020, PC4 on 1/1/4 access vlan 20
#   iBGP single-AS -> route-target auto. leaf1/leaf3 share VNI10010 auto-RT (PC1<->PC3);
#   leaf2/leaf3 share VNI10020 auto-RT (PC2<->PC4).
#   VLAN<->VNI mapping lives under "interface vxlan 1" (vni -> vlan); this AOS-CX
#   rejects "vni" inside vlan context, so it is NOT placed under "vlan 10/20".
#   NOTE: vrnetlab vr-aoscx does NOT learn VTEPs dynamically from EVPN Type-3, so static
#   "vtep-peer" entries are added per VNI: vni 10010 -> leaf1 (10.255.1.1),
#   vni 10020 -> leaf2 (10.255.1.2). EVPN control plane stays as-is.
configure terminal
hostname LEAF3
vlan 10
vlan 20
router ospf 1
    router-id 10.255.1.3
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.5/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.5/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface 1/1/4
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.3/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.3
    no shutdown
    vni 10010
        vlan 10
        vtep-peer 10.255.1.1
        exit
    vni 10020
        vlan 20
        vtep-peer 10.255.1.2
        exit
    exit
evpn
    vlan 10
        rd auto
        route-target export auto
        route-target import auto
        exit
    vlan 20
        rd auto
        route-target export auto
        route-target import auto
        exit
    exit
router bgp 65000
    bgp router-id 10.255.1.3
    neighbor 10.255.0.1 remote-as 65000
    neighbor 10.255.0.1 update-source loopback 0
    neighbor 10.255.0.2 remote-as 65000
    neighbor 10.255.0.2 update-source loopback 0
    address-family l2vpn evpn
        neighbor 10.255.0.1 activate
        neighbor 10.255.0.2 activate
        exit-address-family
end
