# spine-leaf default config for Spine02
# Role: OSPF underlay. loopback0 10.0.0.2, P2P /31 links to both leaves, area 0.
# OSPF process is created first so per-interface "ip ospf 1 area" binds cleanly.
configure terminal
hostname Spine02
router ospf 1
    router-id 10.0.0.2
    area 0.0.0.0
interface loopback 0
    ip address 10.0.0.2/32
    ip ospf 1 area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.1.1.4/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.1.1.6/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
end
