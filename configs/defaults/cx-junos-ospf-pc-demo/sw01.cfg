# cx-junos-ospf-pc-demo default config for AOS-CX sw01 — BEFORE state (NO OSPF).
# Role: PC1 default gateway on 1/1/1 (10.0.1.1/24); P2P toward vsw1 on 1/1/2
#       (10.1.1.1/30); lo0 1.1.1.1/32.
# Intentionally NO "router ospf" stanza — this is the demo "before" state, so
# PC1 -> PC2 must fail until OSPF is added live (see ospf-demo-answerkey.md).
# CX ports default to shutdown, so explicit "no shutdown" is required.
configure terminal
hostname SW01
interface 1/1/1
    no shutdown
    routing
    ip address 10.0.1.1/24
interface 1/1/2
    no shutdown
    routing
    ip address 10.1.1.1/30
interface loopback 0
    ip address 1.1.1.1/32
end
