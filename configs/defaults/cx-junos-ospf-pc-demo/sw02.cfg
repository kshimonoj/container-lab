# cx-junos-ospf-pc-demo default config for vJunos sw02 — BEFORE state (NO OSPF).
# (set format; the vJunos driver wraps configure/commit.)
# Role: P2P toward sw01 on ge-0/0/0 (10.1.1.2/30); PC2 default gateway on
#       ge-0/0/1 (10.0.2.1/24); lo0 2.2.2.2/32.
# Intentionally NO "protocols ospf" stanza — this is the demo "before" state.
# OSPF (and router-id) are added live during the demo (see ospf-demo-answerkey.md).
set interfaces ge-0/0/0 unit 0 family inet address 10.1.1.2/30
set interfaces ge-0/0/1 unit 0 family inet address 10.0.2.1/24
set interfaces lo0 unit 0 family inet address 2.2.2.2/32
