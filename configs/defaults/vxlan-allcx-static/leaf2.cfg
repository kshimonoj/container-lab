# vxlan-allcx-static (OSPF underlay + STATIC VXLAN VTEP, NO BGP/EVPN) for AOS-CX leaf2 (CLI)
# Role: OSPF area0 underlay only for VTEP reachability. NO control plane (no BGP/EVPN).
#   VTEP source = loopback0 (10.255.1.2). Group2 = VLAN20/VNI10020. PC2 on 1/1/3 access vlan 20.
#   ** STATIC VTEP: remote VTEP pinned with "vtep-peer 10.255.1.3" (leaf3, the other VNI10020
#      member). Origin=static. leaf2 only has VNI10020 -> PC2 reaches PC4 only (isolated from G1). **
configure terminal
hostname LEAF2
vlan 20
router ospf 1
    router-id 10.255.1.2
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.2/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.2
    no shutdown
    vni 10020
        vlan 20
        vtep-peer 10.255.1.3
        exit
    exit
end
