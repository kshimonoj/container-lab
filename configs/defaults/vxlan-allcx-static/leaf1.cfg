# vxlan-allcx-static (OSPF underlay + STATIC VXLAN VTEP, NO BGP/EVPN) for AOS-CX leaf1 (CLI)
# Role: OSPF area0 underlay only for VTEP reachability. NO control plane (no BGP/EVPN).
#   VTEP source = loopback0 (10.255.1.1). Group1 = VLAN10/VNI10010. PC1 on 1/1/3 access vlan 10.
#   ** STATIC VTEP: the remote VTEP is pinned with "vtep-peer 10.255.1.3" (leaf3, the other
#      VNI10010 member). No EVPN learning -> show interface vxlan vteps -> Origin=static.
#      Group separation is by VNI: leaf1 only has VNI10010, so PC1 reaches PC3 only. **
configure terminal
hostname LEAF1
vlan 10
router ospf 1
    router-id 10.255.1.1
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface loopback 0
    ip address 10.255.1.1/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.1
    no shutdown
    vni 10010
        vlan 10
        vtep-peer 10.255.1.3
        exit
    exit
end
