# vxlan-allcx-static (OSPF underlay + STATIC VXLAN VTEP, NO BGP/EVPN) for AOS-CX leaf3 (CLI)
# Role: OSPF area0 underlay only for VTEP reachability. NO control plane (no BGP/EVPN).
#   VTEP source = loopback0 (10.255.1.3). leaf3 hosts BOTH groups:
#     Group1 = VLAN10/VNI10010, PC3 on 1/1/3 access vlan 10
#     Group2 = VLAN20/VNI10020, PC4 on 1/1/4 access vlan 20
#   ** STATIC VTEP: per-VNI vtep-peer -> vni 10010 to leaf1 (10.255.1.1),
#      vni 10020 to leaf2 (10.255.1.2). Origin=static. **
configure terminal
hostname LEAF3
vlan 10
vlan 20
router ospf 1
    router-id 10.255.1.3
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.5/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.5/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface 1/1/4
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.3/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.3
    no shutdown
    vni 10010
        vlan 10
        vtep-peer 10.255.1.1
        exit
    vni 10020
        vlan 20
        vtep-peer 10.255.1.2
        exit
    exit
end
