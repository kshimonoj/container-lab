# auth-verify-radius default config for Access-1 (RADIUS NAS / 802.1X-MAC authenticator)
# Role: PC3 on access VLAN 11 (1/1/1), trunk uplink to Core-1 (1/1/2, VLAN 11,99).
# NAS source = VLAN99 SVI 10.1.99.2 (reaches RADIUS 10.1.99.10 at L2 over VLAN 99).
configure terminal
hostname Access-1
vlan 11
    name USERS
vlan 99
    name SERVICES
interface vlan 11
    ip address 10.1.11.2/24
interface vlan 99
    ip address 10.1.99.2/24
interface 1/1/2
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 11,99
interface 1/1/1
    no shutdown
    no routing
    vlan access 11
# RADIUS server and group
radius-server host 10.1.99.10 key plaintext labpassword
aaa group server radius clab
    server 10.1.99.10
# Enable MAC authentication globally and on the user-facing port
aaa authentication port-access mac-auth
    enable
interface 1/1/1
    aaa authentication port-access mac-auth
        enable
end
