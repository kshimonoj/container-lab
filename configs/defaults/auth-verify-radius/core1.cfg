# auth-verify-radius default config for Core-1
# Role: bridges VLAN 99 between Access-1 and RADIUS, gateway for user VLAN 11.
# Links: 1/1/1 trunk -> Access-1 (VLAN 11,99), 1/1/2 access VLAN 99 -> RADIUS
configure terminal
hostname Core-1
vlan 11
    name USERS
vlan 99
    name SERVICES
interface vlan 11
    ip address 10.1.11.1/24
interface vlan 99
    ip address 10.1.99.1/24
interface 1/1/1
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 11,99
interface 1/1/2
    no shutdown
    no routing
    vlan access 99
end
