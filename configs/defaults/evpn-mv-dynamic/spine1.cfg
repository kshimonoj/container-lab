# evpn-mv-dynamic (OSPF underlay + iBGP EVPN Route Reflector) for vJunos spine1 (set format)
# Role: OSPF area0 underlay + iBGP EVPN Route Reflector (AS 65000). NO VXLAN/VTEP.
#   Spine reflects EVPN Type-2/3 leaf<->leaf as RR; it does NOT encap/decap VXLAN.
#   ge-0/0/0 -> leaf1 (10.0.1.0/31), ge-0/0/1 -> leaf2 (10.0.1.2/31),
#   ge-0/0/2 -> leaf3 (10.0.1.4/31). lo0 10.255.0.1/32 = router-id / OSPF + iBGP local-address.
#   cluster 10.255.0.1 = RR cluster-id. Junos RR keeps next-hop on reflected EVPN routes,
#   and 'family evpn signaling' carries the route-target Extended Community untouched, so
#   AOS-CX leaves can import it and build DYNAMIC VTEPs (Origin=evpn). No EVPN instance here.
# underlay (OSPF)
set interfaces ge-0/0/0 unit 0 family inet address 10.0.1.0/31
set interfaces ge-0/0/1 unit 0 family inet address 10.0.1.2/31
set interfaces ge-0/0/2 unit 0 family inet address 10.0.1.4/31
set interfaces lo0 unit 0 family inet address 10.255.0.1/32
set protocols ospf area 0.0.0.0 interface lo0.0 passive
set protocols ospf area 0.0.0.0 interface ge-0/0/0.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/1.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/2.0 interface-type p2p
# overlay: EVPN Route Reflector (iBGP, family evpn signaling)
set routing-options router-id 10.255.0.1
set routing-options autonomous-system 65000
set protocols bgp group OVERLAY type internal
set protocols bgp group OVERLAY local-address 10.255.0.1
set protocols bgp group OVERLAY family evpn signaling
set protocols bgp group OVERLAY cluster 10.255.0.1
set protocols bgp group OVERLAY multipath
set protocols bgp group OVERLAY neighbor 10.255.1.1
set protocols bgp group OVERLAY neighbor 10.255.1.2
set protocols bgp group OVERLAY neighbor 10.255.1.3
