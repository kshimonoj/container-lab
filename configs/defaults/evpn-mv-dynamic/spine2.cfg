# evpn-mv-dynamic (OSPF underlay + iBGP EVPN Route Reflector) for vJunos spine2 (set format)
# Role: second EVPN Route Reflector for redundancy (every leaf peers both spines). NO VXLAN/VTEP.
#   ge-0/0/0 -> leaf1 (10.0.2.0/31), ge-0/0/1 -> leaf2 (10.0.2.2/31),
#   ge-0/0/2 -> leaf3 (10.0.2.4/31). lo0 10.255.0.2/32 = router-id / OSPF + iBGP local-address.
#   cluster 10.255.0.2 = RR cluster-id. Reflects EVPN routes with next-hop + RT preserved so
#   AOS-CX leaves build DYNAMIC VTEPs (Origin=evpn).
# underlay (OSPF)
set interfaces ge-0/0/0 unit 0 family inet address 10.0.2.0/31
set interfaces ge-0/0/1 unit 0 family inet address 10.0.2.2/31
set interfaces ge-0/0/2 unit 0 family inet address 10.0.2.4/31
set interfaces lo0 unit 0 family inet address 10.255.0.2/32
set protocols ospf area 0.0.0.0 interface lo0.0 passive
set protocols ospf area 0.0.0.0 interface ge-0/0/0.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/1.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/2.0 interface-type p2p
# overlay: EVPN Route Reflector (iBGP, family evpn signaling)
set routing-options router-id 10.255.0.2
set routing-options autonomous-system 65000
set protocols bgp group OVERLAY type internal
set protocols bgp group OVERLAY local-address 10.255.0.2
set protocols bgp group OVERLAY family evpn signaling
set protocols bgp group OVERLAY cluster 10.255.0.2
set protocols bgp group OVERLAY multipath
set protocols bgp group OVERLAY neighbor 10.255.1.1
set protocols bgp group OVERLAY neighbor 10.255.1.2
set protocols bgp group OVERLAY neighbor 10.255.1.3
