# evpn-mv-dynamic (OSPF underlay + iBGP EVPN + DYNAMIC VXLAN L2VNI) for AOS-CX leaf1 (CLI)
# Role: OSPF area0 underlay + iBGP EVPN RR-client (AS 65000) toward vJunos spine1/spine2 (EVPN RR).
#   VTEP source = loopback0 (10.255.1.1). Group1 = VLAN10/VNI10010. PC1 on 1/1/3 access vlan 10.
#   iBGP single-AS -> route-target auto (AS:VNI). leaf1/leaf3 share VNI10010 auto-RT.
#   ** DYNAMIC VTEP: no "vtep-peer" is configured. send-community extended on both EVPN
#      neighbors makes the vJunos RR reflect the RT (extended community); leaf1 imports the
#      Type-3 from leaf3 (via RR) and auto-builds the VTEP (show interface vxlan vteps -> Origin=evpn). **
configure terminal
hostname LEAF1
vlan 10
router ospf 1
    router-id 10.255.1.1
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface loopback 0
    ip address 10.255.1.1/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.1
    no shutdown
    vni 10010
        vlan 10
        exit
    exit
evpn
    vlan 10
        rd auto
        route-target export auto
        route-target import auto
        exit
    exit
router bgp 65000
    bgp router-id 10.255.1.1
    neighbor 10.255.0.1 remote-as 65000
    neighbor 10.255.0.1 update-source loopback 0
    neighbor 10.255.0.2 remote-as 65000
    neighbor 10.255.0.2 update-source loopback 0
    address-family l2vpn evpn
        neighbor 10.255.0.1 activate
        neighbor 10.255.0.1 send-community extended
        neighbor 10.255.0.2 activate
        neighbor 10.255.0.2 send-community extended
        exit-address-family
end
