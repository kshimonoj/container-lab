# cx-junos-p2p-ospf default config for vJunos vsw1 (set format; driver wraps configure/commit)
# Role: OSPF area 0 P2P toward cx1 on ge-0/0/0 (10.0.0.2/30).
#       lo0 192.168.2.1/32 advertised as a passive OSPF interface.
set interfaces ge-0/0/0 unit 0 family inet address 10.0.0.2/30
set interfaces lo0 unit 0 family inet address 192.168.2.1/32
set routing-options router-id 192.168.2.1
set protocols ospf area 0.0.0.0 interface ge-0/0/0.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface lo0.0 passive
