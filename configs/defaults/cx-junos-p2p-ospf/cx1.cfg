# cx-junos-p2p-ospf default config for AOS-CX cx1
# Role: OSPF area 0 P2P toward vsw1 on 1/1/1 (10.0.0.1/30).
#       lo0 192.168.1.1/32 advertised as an OSPF area-0 stub (intra-area /32),
#       which propagates reliably to the vJunos side (redistribute connected
#       did not originate an external LSA on this AOS-CX build).
# OSPF process is created first so per-interface "ip ospf 1 area" binds cleanly.
configure terminal
hostname CX1
router ospf 1
    router-id 192.168.1.1
    area 0.0.0.0
interface loopback 0
    ip address 192.168.1.1/32
    ip ospf 1 area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.0.1/30
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
end
