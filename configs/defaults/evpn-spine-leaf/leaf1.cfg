# evpn-spine-leaf (L1 underlay) default config for AOS-CX leaf1 (CLI format)
# Role: eBGP underlay leaf, AS 65101. Peers both spines, advertises lo0.
#   1/1/1 -> spine1 (10.0.1.1/31), 1/1/2 -> spine2 (10.0.2.1/31).
#   loopback0 10.255.1.1/32 (router-id / future VTEP). 1/1/3 -> pc1 (L1: up only).
configure terminal
hostname LEAF1
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
interface 1/1/3
    no shutdown
interface loopback 0
    ip address 10.255.1.1/32
router bgp 65101
    bgp router-id 10.255.1.1
    neighbor 10.0.1.0 remote-as 65001
    neighbor 10.0.2.0 remote-as 65002
    address-family ipv4 unicast
        network 10.255.1.1/32
        neighbor 10.0.1.0 activate
        neighbor 10.0.2.0 activate
        exit-address-family
end
