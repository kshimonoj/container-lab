# evpn-spine-leaf (L1 underlay + L2 EVPN control plane) for AOS-CX leaf1 (CLI)
# Role: eBGP underlay leaf, AS 65101. Peers both spines (underlay), advertises lo0.
#   1/1/1 -> spine1 (10.0.1.1/31), 1/1/2 -> spine2 (10.0.2.1/31).
#   loopback0 10.255.1.1/32 (router-id / VTEP source). 1/1/3 -> pc1 (L1: up only).
# L2: Lean-Spine eBGP EVPN. Full-mesh overlay to leaf2/leaf3 over loopbacks
#   (ebgp-multihop, update-source lo0). No VNI yet (added in L3). Multi-AS, so no
#   allowas-in needed. L1 underlay relays leaf loopbacks, so multihop is reachable.
configure terminal
hostname LEAF1
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
interface 1/1/3
    no shutdown
interface loopback 0
    ip address 10.255.1.1/32
router bgp 65101
    bgp router-id 10.255.1.1
    neighbor 10.0.1.0 remote-as 65001
    neighbor 10.0.2.0 remote-as 65002
    neighbor 10.255.1.2 remote-as 65102
    neighbor 10.255.1.2 ebgp-multihop 255
    neighbor 10.255.1.2 update-source loopback 0
    neighbor 10.255.1.3 remote-as 65103
    neighbor 10.255.1.3 ebgp-multihop 255
    neighbor 10.255.1.3 update-source loopback 0
    address-family ipv4 unicast
        network 10.255.1.1/32
        neighbor 10.0.1.0 activate
        neighbor 10.0.2.0 activate
        exit-address-family
    address-family l2vpn evpn
        neighbor 10.255.1.2 activate
        neighbor 10.255.1.3 activate
        exit-address-family
end
