# evpn-spine-leaf (L1 underlay) default config for AOS-CX leaf2 (CLI format)
# Role: eBGP underlay leaf, AS 65102. Peers both spines, advertises lo0.
#   1/1/1 -> spine1 (10.0.1.3/31), 1/1/2 -> spine2 (10.0.2.3/31).
#   loopback0 10.255.1.2/32 (router-id / future VTEP). 1/1/3 -> pc2 (L1: up only).
configure terminal
hostname LEAF2
interface 1/1/1
    no shutdown
    ip address 10.0.1.3/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.3/31
interface 1/1/3
    no shutdown
interface loopback 0
    ip address 10.255.1.2/32
router bgp 65102
    bgp router-id 10.255.1.2
    neighbor 10.0.1.2 remote-as 65001
    neighbor 10.0.2.2 remote-as 65002
    address-family ipv4 unicast
        network 10.255.1.2/32
        neighbor 10.0.1.2 activate
        neighbor 10.0.2.2 activate
        exit-address-family
end
