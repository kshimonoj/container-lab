# evpn-spine-leaf (L1 underlay) default config for AOS-CX leaf3 (CLI format)
# Role: eBGP underlay leaf, AS 65103. Peers both spines, advertises lo0.
#   1/1/1 -> spine1 (10.0.1.5/31), 1/1/2 -> spine2 (10.0.2.5/31).
#   loopback0 10.255.1.3/32 (router-id / future VTEP). 1/1/3 -> pc3 (L1: up only).
configure terminal
hostname LEAF3
interface 1/1/1
    no shutdown
    ip address 10.0.1.5/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.5/31
interface 1/1/3
    no shutdown
interface loopback 0
    ip address 10.255.1.3/32
router bgp 65103
    bgp router-id 10.255.1.3
    neighbor 10.0.1.4 remote-as 65001
    neighbor 10.0.2.4 remote-as 65002
    address-family ipv4 unicast
        network 10.255.1.3/32
        neighbor 10.0.1.4 activate
        neighbor 10.0.2.4 activate
        exit-address-family
end
