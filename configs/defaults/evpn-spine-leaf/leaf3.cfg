# evpn-spine-leaf (L1 underlay + L2 EVPN control plane) for AOS-CX leaf3 (CLI)
# Role: eBGP underlay leaf, AS 65103. Peers both spines (underlay), advertises lo0.
#   1/1/1 -> spine1 (10.0.1.5/31), 1/1/2 -> spine2 (10.0.2.5/31).
#   loopback0 10.255.1.3/32 (router-id / VTEP source). 1/1/3 -> pc3 (L1: up only).
# L2: Lean-Spine eBGP EVPN. Full-mesh overlay to leaf1/leaf2 over loopbacks
#   (ebgp-multihop, update-source lo0). No VNI yet (added in L3). Multi-AS, so no
#   allowas-in needed. L1 underlay relays leaf loopbacks, so multihop is reachable.
configure terminal
hostname LEAF3
interface 1/1/1
    no shutdown
    ip address 10.0.1.5/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.5/31
interface 1/1/3
    no shutdown
interface loopback 0
    ip address 10.255.1.3/32
router bgp 65103
    bgp router-id 10.255.1.3
    neighbor 10.0.1.4 remote-as 65001
    neighbor 10.0.2.4 remote-as 65002
    neighbor 10.255.1.1 remote-as 65101
    neighbor 10.255.1.1 ebgp-multihop 255
    neighbor 10.255.1.1 update-source loopback 0
    neighbor 10.255.1.2 remote-as 65102
    neighbor 10.255.1.2 ebgp-multihop 255
    neighbor 10.255.1.2 update-source loopback 0
    address-family ipv4 unicast
        network 10.255.1.3/32
        neighbor 10.0.1.4 activate
        neighbor 10.0.2.4 activate
        exit-address-family
    address-family l2vpn evpn
        neighbor 10.255.1.1 activate
        neighbor 10.255.1.2 activate
        exit-address-family
end
