# cx-junos-core default config for vJunos vsw1 (core/spine, set format)
# Role: OSPF area 0 core. ge-0/0/0 -> cx1 (10.0.2.2/30), ge-0/0/1 -> vsw2 core (10.0.1.1/30).
#       lo0 192.168.2.1/32 advertised passive.
set interfaces ge-0/0/0 unit 0 family inet address 10.0.2.2/30
set interfaces ge-0/0/1 unit 0 family inet address 10.0.1.1/30
set interfaces lo0 unit 0 family inet address 192.168.2.1/32
set routing-options router-id 192.168.2.1
set protocols ospf area 0.0.0.0 interface ge-0/0/0.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/1.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface lo0.0 passive
