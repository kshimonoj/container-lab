# vsx-mclag default config for Core SW02 (VSX secondary)
# Order inside file matters: VSX is configured before the MCLAG downlink.
# Links: 1/1/1 uplink->Router, 1/1/3 ISL, 1/1/4 keepalive, 1/1/5 MCLAG->Access
configure terminal
hostname Core-SW02
# Keepalive transport VRF
vrf KA
interface 1/1/4
    no shutdown
    vrf attach KA
    ip address 192.168.0.1/31
# Inter-switch link (ISL) LAG
interface lag 256
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed all
    lacp mode active
interface 1/1/3
    no shutdown
    lag 256
# VSX (must precede MCLAG)
vsx
    system-mac 02:01:00:00:01:00
    inter-switch-link lag 256
    role secondary
    keepalive peer 192.168.0.0 source 192.168.0.1 vrf KA
# Data VLAN + SVI + active-gateway
vlan 10
    name DATA
interface vlan 10
    ip address 10.1.10.3/24
    active-gateway ip 10.1.10.1 mac 02:02:00:00:01:00
# MCLAG downlink to Access SW03
interface lag 1 multi-chassis
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 10
    lacp mode active
interface 1/1/5
    no shutdown
    lag 1
# L3 uplink to Router SW04
interface 1/1/1
    no shutdown
    ip address 10.0.2.0/31
end
