# vsx-mclag default config for Access SW03
# Role: dual-homed to VSX core via a regular LAG (peer side is multi-chassis).
# Links: 1/1/1 -> Core SW01, 1/1/2 -> Core SW02, 1/1/6 -> PC (access VLAN 10)
configure terminal
hostname Access-SW03
vlan 10
    name DATA
interface lag 1
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 10
    lacp mode active
interface 1/1/1
    no shutdown
    lag 1
interface 1/1/2
    no shutdown
    lag 1
interface 1/1/6
    no shutdown
    no routing
    vlan access 10
end
