# vsx-mclag default config for Router SW04 (upstream L3, minimal)
# Role: L3 router upstream of the VSX core. Two P2P /31 uplinks, ECMP static to data VLAN.
# Links: 1/1/1 -> Core SW01 (10.0.1.0/31), 1/1/2 -> Core SW02 (10.0.2.0/31)
configure terminal
hostname Router-SW04
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
ip route 10.1.10.0/24 10.0.1.0
ip route 10.1.10.0/24 10.0.2.0
end
