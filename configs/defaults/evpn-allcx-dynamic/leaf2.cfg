# evpn-allcx-dynamic (OSPF underlay + iBGP EVPN + DYNAMIC VXLAN L2VNI) for AOS-CX leaf2 (CLI)
# Role: OSPF area0 underlay + iBGP EVPN RR-client (AS 65000) toward spine1/spine2.
#   VTEP source = loopback0 (10.255.1.2). Group2 = VLAN20/VNI10020. PC2 on 1/1/3 access vlan 20.
#   iBGP single-AS -> route-target auto. leaf2/leaf3 share VNI10020 auto-RT (PC2<->PC4);
#   Group2 (AS:10020) differs from Group1 (AS:10010), so PC2 is isolated from PC1/PC3.
#   ** DYNAMIC VTEP: no "vtep-peer"; send-community extended lets EVPN build the VTEP toward
#      leaf3 automatically (Origin=evpn). **
configure terminal
hostname LEAF2
vlan 20
router ospf 1
    router-id 10.255.1.2
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.2/32
    ip ospf 1 area 0.0.0.0
interface vxlan 1
    source ip 10.255.1.2
    no shutdown
    vni 10020
        vlan 20
        exit
    exit
evpn
    vlan 20
        rd auto
        route-target export auto
        route-target import auto
        exit
    exit
router bgp 65000
    bgp router-id 10.255.1.2
    neighbor 10.255.0.1 remote-as 65000
    neighbor 10.255.0.1 update-source loopback 0
    neighbor 10.255.0.2 remote-as 65000
    neighbor 10.255.0.2 update-source loopback 0
    address-family l2vpn evpn
        neighbor 10.255.0.1 activate
        neighbor 10.255.0.1 send-community extended
        neighbor 10.255.0.2 activate
        neighbor 10.255.0.2 send-community extended
        exit-address-family
end
