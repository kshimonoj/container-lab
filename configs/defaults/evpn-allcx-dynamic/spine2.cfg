# evpn-allcx-dynamic (OSPF underlay + iBGP EVPN RR) default config for AOS-CX spine2 (CLI)
# Role: OSPF area0 underlay + iBGP EVPN Route Reflector (AS 65000). NO VXLAN/VTEP.
#   Second RR for redundancy (every leaf peers both spines).
#   1/1/1 -> leaf1 (10.0.2.0/31), 1/1/2 -> leaf2 (10.0.2.2/31), 1/1/3 -> leaf3 (10.0.2.4/31).
#   lo0 10.255.0.2/32 = router-id / OSPF + iBGP update-source.
#   ** send-community extended is set on every EVPN neighbor so the BGP Extended
#      Community that carries the EVPN route-target is reflected to the leaves; this is
#      what lets leaves import Type-2/3 and build DYNAMIC VTEPs (Origin=evpn). **
configure terminal
hostname SPINE2
router ospf 1
    router-id 10.255.0.2
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.2.0/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.2/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    ip address 10.0.2.4/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface loopback 0
    ip address 10.255.0.2/32
    ip ospf 1 area 0.0.0.0
router bgp 65000
    bgp router-id 10.255.0.2
    neighbor 10.255.1.1 remote-as 65000
    neighbor 10.255.1.1 update-source loopback 0
    neighbor 10.255.1.2 remote-as 65000
    neighbor 10.255.1.2 update-source loopback 0
    neighbor 10.255.1.3 remote-as 65000
    neighbor 10.255.1.3 update-source loopback 0
    address-family l2vpn evpn
        neighbor 10.255.1.1 activate
        neighbor 10.255.1.1 route-reflector-client
        neighbor 10.255.1.1 send-community extended
        neighbor 10.255.1.2 activate
        neighbor 10.255.1.2 route-reflector-client
        neighbor 10.255.1.2 send-community extended
        neighbor 10.255.1.3 activate
        neighbor 10.255.1.3 route-reflector-client
        neighbor 10.255.1.3 send-community extended
        exit-address-family
end
