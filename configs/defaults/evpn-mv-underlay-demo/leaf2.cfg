# evpn-mv-underlay-demo (OSPF underlay ONLY, no overlay) for AOS-CX leaf2 (CLI)
# Role: OSPF area0 underlay only. NO VXLAN / NO BGP / NO EVPN / NO access vlan (before-state).
#   1/1/1 -> spine1 (10.0.1.3/31), 1/1/2 -> spine2 (10.0.2.3/31).
#   loopback0 10.255.1.2/32 = router-id / VTEP source (overlay 投入後に使う)。
#   ★ アクセスポート 1/1/3 (PC2) は VLAN/VXLAN が無いので未設定。
#      overlay 投入時に vlan20 / vlan access / interface vxlan と一緒に追加する。
#   overlay は evpn-mv-underlay-demo-answerkey.md を MCP apply_config で投入する。
configure terminal
hostname LEAF2
router ospf 1
    router-id 10.255.1.2
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface loopback 0
    ip address 10.255.1.2/32
    ip ospf 1 area 0.0.0.0
end
