# evpn-mv-underlay-demo (OSPF underlay ONLY, no overlay) for vJunos spine2 (set format)
# Role: OSPF area0 underlay only. NO BGP / NO EVPN / NO VTEP (before-state).
#   ge-0/0/0 -> leaf1 (10.0.2.0/31), ge-0/0/1 -> leaf2 (10.0.2.2/31),
#   ge-0/0/2 -> leaf3 (10.0.2.4/31). lo0 10.255.0.2/32 = router-id / OSPF.
#   router-id / autonomous-system 65000 はあえて設定しておき、デモ時の overlay
#   (iBGP EVPN Route Reflector) 投入でそのまま流用する。
#   overlay は evpn-mv-underlay-demo-answerkey.md を MCP apply_config で投入する。
# underlay (OSPF)
set interfaces ge-0/0/0 unit 0 family inet address 10.0.2.0/31
set interfaces ge-0/0/1 unit 0 family inet address 10.0.2.2/31
set interfaces ge-0/0/2 unit 0 family inet address 10.0.2.4/31
set interfaces lo0 unit 0 family inet address 10.255.0.2/32
set protocols ospf area 0.0.0.0 interface lo0.0 passive
set protocols ospf area 0.0.0.0 interface ge-0/0/0.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/1.0 interface-type p2p
set protocols ospf area 0.0.0.0 interface ge-0/0/2.0 interface-type p2p
# router-id / AS は overlay 投入時に流用 (ここでは BGP/EVPN は設定しない)
set routing-options router-id 10.255.0.2
set routing-options autonomous-system 65000
