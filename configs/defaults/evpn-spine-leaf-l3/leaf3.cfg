# evpn-spine-leaf-l3 (L1 underlay + L2 EVPN CP + L3 VXLAN L2VNI) for AOS-CX leaf3 (CLI)
# Role: eBGP underlay leaf AS65103; Lean-Spine eBGP EVPN full-mesh over loopbacks.
# L3: VXLAN data plane. VTEP source = loopback0 (10.255.1.3). leaf3 hosts BOTH groups:
#   Group1 = VLAN10/VNI10010, PC3 on 1/1/3 access vlan 10 (shares VNI10010 with leaf1);
#   Group2 = VLAN20/VNI10020, PC4 on 1/1/4 access vlan 20 (shares VNI10020 with leaf2).
#   eBGP EVPN needs manual RT per EVI (10010:10010 / 10020:10020 both ways), so PC1<->PC3
#   (Group1) and PC2<->PC4 (Group2) cross the VXLAN fabric while groups stay isolated.
#   VLAN<->VNI mapping lives under "interface vxlan 1" (vni -> vlan); this AOS-CX
#   rejects "vni" inside vlan context, so it is NOT placed under "vlan 10/20".
#   NOTE: vrnetlab vr-aoscx does NOT learn VTEPs dynamically from EVPN Type-3, so static
#   "vtep-peer" entries are added per VNI: vni 10010 -> leaf1 (10.255.1.1),
#   vni 10020 -> leaf2 (10.255.1.2). EVPN control plane stays as-is.
configure terminal
hostname LEAF3
vlan 10
vlan 20
interface 1/1/1
    no shutdown
    ip address 10.0.1.5/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.5/31
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface 1/1/4
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.3/32
interface vxlan 1
    source ip 10.255.1.3
    no shutdown
    vni 10010
        vlan 10
        vtep-peer 10.255.1.1
        exit
    vni 10020
        vlan 20
        vtep-peer 10.255.1.2
        exit
    exit
evpn
    vlan 10
        rd auto
        route-target export 10010:10010
        route-target import 10010:10010
        exit
    vlan 20
        rd auto
        route-target export 10020:10020
        route-target import 10020:10020
        exit
    exit
router bgp 65103
    bgp router-id 10.255.1.3
    neighbor 10.0.1.4 remote-as 65001
    neighbor 10.0.2.4 remote-as 65002
    neighbor 10.255.1.1 remote-as 65101
    neighbor 10.255.1.1 ebgp-multihop 255
    neighbor 10.255.1.1 update-source loopback 0
    neighbor 10.255.1.2 remote-as 65102
    neighbor 10.255.1.2 ebgp-multihop 255
    neighbor 10.255.1.2 update-source loopback 0
    address-family ipv4 unicast
        network 10.255.1.3/32
        neighbor 10.0.1.4 activate
        neighbor 10.0.2.4 activate
        exit-address-family
    address-family l2vpn evpn
        neighbor 10.255.1.1 activate
        neighbor 10.255.1.2 activate
        exit-address-family
end
