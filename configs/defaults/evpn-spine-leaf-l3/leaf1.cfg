# evpn-spine-leaf-l3 (L1 underlay + L2 EVPN CP + L3 VXLAN L2VNI) for AOS-CX leaf1 (CLI)
# Role: eBGP underlay leaf AS65101; Lean-Spine eBGP EVPN full-mesh over loopbacks.
# L3: VXLAN data plane. VTEP source = loopback0 (10.255.1.1). Group1 = VLAN10/VNI10010.
#   PC1 on 1/1/3 -> access vlan 10. eBGP EVPN needs manual RT (10010:10010 both ways);
#   leaf1/leaf3 share VNI10010 (Group1), so PC1<->PC3 cross the VXLAN fabric.
#   VLAN<->VNI mapping lives under "interface vxlan 1" (vni -> vlan); this AOS-CX
#   rejects "vni" inside vlan context, so it is NOT placed under "vlan 10".
#   NOTE: vrnetlab vr-aoscx does NOT learn VTEPs dynamically from EVPN Type-3, so a
#   static "vtep-peer" toward leaf3 (10.255.1.3, the other VNI10010 member) is added
#   under vni 10010 to bring the VXLAN data plane up (PC1<->PC3). EVPN CP stays as-is.
configure terminal
hostname LEAF1
vlan 10
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface loopback 0
    ip address 10.255.1.1/32
interface vxlan 1
    source ip 10.255.1.1
    no shutdown
    vni 10010
        vlan 10
        vtep-peer 10.255.1.3
        exit
    exit
evpn
    vlan 10
        rd auto
        route-target export 10010:10010
        route-target import 10010:10010
        exit
    exit
router bgp 65101
    bgp router-id 10.255.1.1
    neighbor 10.0.1.0 remote-as 65001
    neighbor 10.0.2.0 remote-as 65002
    neighbor 10.255.1.2 remote-as 65102
    neighbor 10.255.1.2 ebgp-multihop 255
    neighbor 10.255.1.2 update-source loopback 0
    neighbor 10.255.1.3 remote-as 65103
    neighbor 10.255.1.3 ebgp-multihop 255
    neighbor 10.255.1.3 update-source loopback 0
    address-family ipv4 unicast
        network 10.255.1.1/32
        neighbor 10.0.1.0 activate
        neighbor 10.0.2.0 activate
        exit-address-family
    address-family l2vpn evpn
        neighbor 10.255.1.2 activate
        neighbor 10.255.1.3 activate
        exit-address-family
end
