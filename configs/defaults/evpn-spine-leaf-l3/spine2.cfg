# evpn-spine-leaf (L1 underlay) default config for vJunos spine2 (set format)
# Role: eBGP underlay spine, AS 65002. Peers all three leaves, relays loopbacks.
#   ge-0/0/0 -> leaf1 (10.0.2.0/31), ge-0/0/1 -> leaf2 (10.0.2.2/31),
#   ge-0/0/2 -> leaf3 (10.0.2.4/31). lo0 10.255.0.2/32 (router-id / future VTEP).
set interfaces ge-0/0/0 unit 0 family inet address 10.0.2.0/31
set interfaces ge-0/0/1 unit 0 family inet address 10.0.2.2/31
set interfaces ge-0/0/2 unit 0 family inet address 10.0.2.4/31
set interfaces lo0 unit 0 family inet address 10.255.0.2/32
set routing-options router-id 10.255.0.2
set routing-options autonomous-system 65002
set protocols bgp group underlay type external
set protocols bgp group underlay export export-underlay
set protocols bgp group underlay neighbor 10.0.2.1 peer-as 65101
set protocols bgp group underlay neighbor 10.0.2.3 peer-as 65102
set protocols bgp group underlay neighbor 10.0.2.5 peer-as 65103
# Advertise own lo0 + all BGP-learned loopbacks (relay leaf<->leaf via this spine).
set policy-options policy-statement export-underlay term loopbacks from route-filter 10.255.0.0/16 orlonger
set policy-options policy-statement export-underlay term loopbacks then accept
