# evpn-spine-leaf-l3 (L1 underlay + L2 EVPN CP + L3 VXLAN L2VNI) for AOS-CX leaf2 (CLI)
# Role: eBGP underlay leaf AS65102; Lean-Spine eBGP EVPN full-mesh over loopbacks.
# L3: VXLAN data plane. VTEP source = loopback0 (10.255.1.2). Group2 = VLAN20/VNI10020.
#   PC2 on 1/1/3 -> access vlan 20. eBGP EVPN needs manual RT (10020:10020 both ways);
#   leaf2/leaf3 share VNI10020 (Group2), so PC2<->PC4 cross the VXLAN fabric. Group2
#   neither imports nor exports 10010:10010, so no L2 reachability to Group1 (PC1/PC3).
#   VLAN<->VNI mapping lives under "interface vxlan 1" (vni -> vlan); this AOS-CX
#   rejects "vni" inside vlan context, so it is NOT placed under "vlan 20".
#   NOTE: vrnetlab vr-aoscx does NOT learn VTEPs dynamically from EVPN Type-3, so a
#   static "vtep-peer" toward leaf3 (10.255.1.3, the other VNI10020 member) is added
#   under vni 10020 to bring the VXLAN data plane up (PC2<->PC4). EVPN CP stays as-is.
configure terminal
hostname LEAF2
vlan 20
interface 1/1/1
    no shutdown
    ip address 10.0.1.3/31
interface 1/1/2
    no shutdown
    ip address 10.0.2.3/31
interface 1/1/3
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.2/32
interface vxlan 1
    source ip 10.255.1.2
    no shutdown
    vni 10020
        vlan 20
        vtep-peer 10.255.1.3
        exit
    exit
evpn
    vlan 20
        rd auto
        route-target export 10020:10020
        route-target import 10020:10020
        exit
    exit
router bgp 65102
    bgp router-id 10.255.1.2
    neighbor 10.0.1.2 remote-as 65001
    neighbor 10.0.2.2 remote-as 65002
    neighbor 10.255.1.1 remote-as 65101
    neighbor 10.255.1.1 ebgp-multihop 255
    neighbor 10.255.1.1 update-source loopback 0
    neighbor 10.255.1.3 remote-as 65103
    neighbor 10.255.1.3 ebgp-multihop 255
    neighbor 10.255.1.3 update-source loopback 0
    address-family ipv4 unicast
        network 10.255.1.2/32
        neighbor 10.0.1.2 activate
        neighbor 10.0.2.2 activate
        exit-address-family
    address-family l2vpn evpn
        neighbor 10.255.1.1 activate
        neighbor 10.255.1.3 activate
        exit-address-family
end
