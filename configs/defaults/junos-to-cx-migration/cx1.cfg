# junos-to-cx-migration default config for AOS-CX cx1 (leaf, HPE 新規導入)
# Role: dual-homed L2 leaf. 1/1/1 -> vsw1, 1/1/2 -> vsw2. Trunks VLAN 10/20.
#       SVIs 10.0.10.1/24 and 10.0.20.1/24. spanning-tree on to avoid the loop
#       across the two uplinks (interops with the spines' RSTP via CIST).
configure terminal
hostname CX1
spanning-tree
vlan 10
    name VLAN10
vlan 20
    name VLAN20
interface 1/1/1
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 10,20
interface 1/1/2
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 10,20
interface vlan 10
    ip address 10.0.10.1/24
interface vlan 20
    ip address 10.0.20.1/24
end
