# cx-junos-l2-trunk default config for AOS-CX cx1
# Role: tagged L2 trunk toward vsw1 carrying VLAN 10/20/30 (native 1 untagged).
#       Per-VLAN SVIs 10.0.{10,20,30}.1/30 for per-VLAN connectivity tests.
configure terminal
hostname CX1
vlan 10
    name VLAN10
vlan 20
    name VLAN20
vlan 30
    name VLAN30
interface 1/1/1
    no shutdown
    no routing
    vlan trunk native 1
    vlan trunk allowed 10,20,30
interface vlan 10
    ip address 10.0.10.1/30
interface vlan 20
    ip address 10.0.20.1/30
interface vlan 30
    ip address 10.0.30.1/30
end
