# cx-junos-l2-trunk default config for vJunos vsw1 (set format; driver wraps configure/commit)
# Role: tagged L2 trunk toward cx1 carrying VLAN 10/20/30.
#       Per-VLAN IRB SVIs 10.0.{10,20,30}.2/30 for per-VLAN connectivity tests.
set vlans VLAN10 vlan-id 10
set vlans VLAN20 vlan-id 20
set vlans VLAN30 vlan-id 30
set interfaces ge-0/0/0 unit 0 family ethernet-switching interface-mode trunk
set interfaces ge-0/0/0 unit 0 family ethernet-switching vlan members [ VLAN10 VLAN20 VLAN30 ]
set interfaces irb unit 10 family inet address 10.0.10.2/30
set interfaces irb unit 20 family inet address 10.0.20.2/30
set interfaces irb unit 30 family inet address 10.0.30.2/30
set vlans VLAN10 l3-interface irb.10
set vlans VLAN20 l3-interface irb.20
set vlans VLAN30 l3-interface irb.30
