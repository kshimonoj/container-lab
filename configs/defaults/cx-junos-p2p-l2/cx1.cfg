# cx-junos-p2p-l2 default config for AOS-CX cx1
# Role: L2 trunk toward vJunos vsw1. VLAN10 is the trunk's NATIVE (untagged)
#       VLAN so it interoperates with vsw1's plain inet on ge-0/0/0.0.
#       SVI vlan10 = 10.0.10.1/30 for the connectivity test.
configure terminal
hostname CX1
vlan 10
    name INTEROP
interface 1/1/1
    no shutdown
    no routing
    vlan trunk native 10
    vlan trunk allowed 10
interface vlan 10
    ip address 10.0.10.1/30
end
