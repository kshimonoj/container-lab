# allcx-underlay-demo (OSPF underlay only, NO BGP/EVPN) for AOS-CX spine2 (CLI)
# Role: pure OSPF area0 transit so leaf loopbacks reach each other (VTEP underlay).
#   No BGP, no EVPN, no VXLAN: underlay-only before-state. The spine just provides
#   OSPF reachability between leaf loopbacks; no overlay is configured anywhere yet.
#   1/1/1 -> leaf1 (10.0.2.0/31), 1/1/2 -> leaf2 (10.0.2.2/31), 1/1/3 -> leaf3 (10.0.2.4/31).
configure terminal
hostname SPINE2
router ospf 1
    router-id 10.255.0.2
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.2.0/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.2/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    ip address 10.0.2.4/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface loopback 0
    ip address 10.255.0.2/32
    ip ospf 1 area 0.0.0.0
end
