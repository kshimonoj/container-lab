# allcx-underlay-demo (OSPF underlay ONLY, no overlay) for AOS-CX leaf1 (CLI)
# Role: OSPF area0 underlay + access vlan port. NO VXLAN, NO BGP, NO EVPN (before-state).
#   VLAN10 access on 1/1/3 (PC1) exists locally, but there is NO VXLAN/VNI, so the
#   VLAN does NOT extend across leaves: PC1 cannot reach PC3 (overlay missing on purpose).
#   Loopback0 10.255.1.1/32 is OSPF-reachable -> overlay can be added later via MCP.
#   See allcx-underlay-demo-answerkey.md for the overlay (dynamic OR static) to apply live.
configure terminal
hostname LEAF1
vlan 10
router ospf 1
    router-id 10.255.1.1
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.1/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface loopback 0
    ip address 10.255.1.1/32
    ip ospf 1 area 0.0.0.0
end
