# allcx-underlay-demo (OSPF underlay ONLY, no overlay) for AOS-CX leaf3 (CLI)
# Role: OSPF area0 underlay + access vlan ports. NO VXLAN, NO BGP, NO EVPN (before-state).
#   leaf3 hosts two access ports: 1/1/3 vlan10 (PC3), 1/1/4 vlan20 (PC4). No VNI ->
#   neither group extends across leaves until the overlay is applied later (MCP/answer key).
#   Loopback0 10.255.1.3/32 is OSPF-reachable.
configure terminal
hostname LEAF3
vlan 10
vlan 20
router ospf 1
    router-id 10.255.1.3
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.5/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.5/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 10
interface 1/1/4
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.3/32
    ip ospf 1 area 0.0.0.0
end
