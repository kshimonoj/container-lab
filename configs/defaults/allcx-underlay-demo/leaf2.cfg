# allcx-underlay-demo (OSPF underlay ONLY, no overlay) for AOS-CX leaf2 (CLI)
# Role: OSPF area0 underlay + access vlan port. NO VXLAN, NO BGP, NO EVPN (before-state).
#   VLAN20 access on 1/1/3 (PC2) is local only; no VNI -> PC2 isolated until overlay added.
#   Loopback0 10.255.1.2/32 is OSPF-reachable -> overlay can be added later via MCP.
configure terminal
hostname LEAF2
vlan 20
router ospf 1
    router-id 10.255.1.2
    area 0.0.0.0
interface 1/1/1
    no shutdown
    ip address 10.0.1.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/2
    no shutdown
    ip address 10.0.2.3/31
    ip ospf 1 area 0.0.0.0
    ip ospf network point-to-point
interface 1/1/3
    no shutdown
    no routing
    vlan access 20
interface loopback 0
    ip address 10.255.1.2/32
    ip ospf 1 area 0.0.0.0
end
